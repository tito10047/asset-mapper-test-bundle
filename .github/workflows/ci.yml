name: CI

on:
    push:
        branches: [ "main", "develop" ]
    pull_request: ~

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    php-tests:
        name: "PHP Tests (PHP ${{ matrix.php-version }}, Symfony ${{ matrix.symfony }})"
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php-version:
                    - "8.4"
                    - "8.5"
                symfony:
                    - "6.4.*"
                    - "7.4.*"
                    - "8.0.*"

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: "Install PHP"
                uses: "shivammathur/setup-php@v2"
                with:
                    php-version: "${{ matrix.php-version }}"
                    ini-values: memory_limit=-1

            -   name: "Configure Symfony"
                run: composer config extra.symfony.require "${{ matrix.symfony }}"

            -   name: "Cache Composer dependencies"
                uses: "actions/cache@v4"
                with:
                    path: ~/.composer/cache
                    key: "php-${{ matrix.php-version }}-symfony-${{ matrix.symfony }}-${{ hashFiles('**/composer.json') }}"
                    restore-keys: "php-${{ matrix.php-version }}-symfony-${{ matrix.symfony }}-"

            -   name: "Install dependencies"
                run: composer update --no-interaction --no-progress

            -   name: "Run PHPUnit"
                run: vendor/bin/phpunit tests/ --no-coverage

    js-tests:
        name: "JS Tests (Node.js 20)"
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: "Setup Node.js"
                uses: actions/setup-node@v4
                with:
                    node-version: 20

            -   name: "Run JS Tests"
                run: node --test
